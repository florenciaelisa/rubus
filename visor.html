<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: transparent;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      background-color: #ffffff;
    }
  </style>
</head>
<body>

<model-viewer
  src="BLANCAS 09 ANIMACION.glb"
  alt="Modelo 3D"
  auto-rotate
  camera-controls
  shadow-intensity="1"
  exposure="1"
  ar>
</model-viewer>

</body>
</html>
